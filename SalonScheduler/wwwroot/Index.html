<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود - پنل نوبت‌دهی مستقل آرایشگاه</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header Section -->
    <header class="header-main">
        <div class="header-container">
            <div class="logo-area">
                <div class="logo-icon-box">✂️</div>
                <div>
                    <h1 class="header-title">نوبت‌دهی آرایشگاه</h1>
                    <p class="header-subtitle">مدیریت مستقل خدمات و نوبت‌های مراجعین شما</p>
                </div>
            </div>

            <div class="header-status-area">
                <div class="db-status-badge">
                    <span class="pulse-indicator-green"></span>
                    <span>اتصال دیتابیس</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Global Toast / Alert Box -->
    <div id="alert-box" class="alert-box alert-hidden">
        <span id="alert-text"></span>
    </div>

    <!-- AUTH PORTAL -->
    <main id="auth-portal" class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-card-header">
                <div class="auth-lock-icon-box">🔐</div>
                <h2 id="auth-title" class="auth-card-title">ورود به پنل نوبت‌دهی</h2>
                <p id="auth-subtitle" class="auth-card-subtitle">وارد حساب آرایشگری خود شوید.</p>
            </div>

            <div id="demo-hint-box" class="demo-box">
                💡 تست سریع: کاربر <span class="font-mono">arash</span> رمز <span class="font-mono">123</span>
            </div>

            <form id="auth-form" class="auth-inner-form">
                <div id="field-fullname-group" class="form-group hidden">
                    <label class="form-label">نام و نام خانوادگی *</label>
                    <input type="text" id="auth-fullname" placeholder="آرش صفوی" class="form-input">
                </div>

                <div class="form-group">
                    <label class="form-label">نام کاربری انگلیسی *</label>
                    <input type="text" id="auth-username" required placeholder="arash" class="form-input font-mono text-left">
                </div>

                <div class="form-group">
                    <label class="form-label">رمز عبور *</label>
                    <input type="password" id="auth-password" required placeholder="••••••••" class="form-input font-mono text-left">
                </div>

                <div id="field-salon-group" class="form-group hidden">
                    <label class="form-label">نام سالن آرایشگاه</label>
                    <input type="text" id="auth-salon" placeholder="سالن کلاسیک" class="form-input">
                </div>

                <button type="submit" id="auth-submit-btn" class="btn-primary">
                    <span>ورود به سیستم نوبت‌دهی</span>
                </button>
            </form>

            <div class="toggle-footer">
                <button type="button" id="auth-mode-toggle" class="btn-text-link">
                    <span>هنوز حساب ندارید؟ ثبت سالن جدید</span>
                </button>
            </div>
        </div>
    </main>

    <script src="js/login.js"></script>
</body>
</html>
